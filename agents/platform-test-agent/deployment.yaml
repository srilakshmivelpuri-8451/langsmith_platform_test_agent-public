name: platform-test-agent
graph_name: platform-test-agent
graph_path: agents/platform-test-agent/agent/graph.py:GRAPH
langsmith_project: platform-test-agent-online
image_name: platform-test-agent

resource_spec:
  cpu: 0.5
  memory_mb: 512
  min_scale: 1
  max_scale: 1

env:
  LLM_MODEL: claude-sonnet-4-6
